<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hussain's Master Watchlist</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0f;--surface:#141416;--surface2:#1c1c20;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#f0efe8;--muted:#888884;--faint:#444440;--accent:#e8c97d;--anime:#a89bdc;--show:#7eb8d4;--movie:#e89a7d;--or:#82d9c5;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}
header{padding:3rem 2rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem}
.header-left h1{font-family:'Instrument Serif',serif;font-size:2.6rem;font-weight:400;line-height:1.1}
.header-left h1 em{font-style:italic;color:var(--accent)}
.header-left p{margin-top:.5rem;color:var(--muted);font-size:13px}
.stats{display:flex;gap:2rem;flex-wrap:wrap}
.stat{text-align:right}
.stat-n{font-family:'DM Mono',monospace;font-size:1.6rem;font-weight:500;line-height:1}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.controls{padding:1.25rem 2rem;border-bottom:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:5px 14px;border-radius:999px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.filter-btn:hover{border-color:rgba(255,255,255,.25);color:var(--text)}
.filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.filter-btn.f-anime.active{background:var(--anime);border-color:var(--anime);color:#13112a}
.filter-btn.f-show.active{background:var(--show);border-color:var(--show);color:#091624}
.filter-btn.f-movie.active{background:var(--movie);border-color:var(--movie);color:#2a1209}
.filter-btn.f-or.active{background:var(--or);border-color:var(--or);color:#042a24}
.add-btn{padding:6px 16px;border-radius:999px;border:1px solid var(--accent);background:rgba(232,201,125,.08);color:var(--accent);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.add-btn:hover{background:rgba(232,201,125,.18)}
.progress-bar-wrap{display:flex;align-items:center;gap:10px}
.progress-bar{width:140px;height:4px;background:var(--surface2);border-radius:2px}
.progress-bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s}
.progress-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap}
.list-container{padding:0 2rem 5rem}
.rank-section{margin-top:2.5rem}
.rank-section-header{display:flex;align-items:center;gap:12px;margin-bottom:.75rem}
.rank-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);font-family:'DM Mono',monospace;white-space:nowrap}
.rank-line{flex:1;height:1px;background:var(--border)}
.item{display:grid;grid-template-columns:28px 1fr auto;gap:0 14px;align-items:center;padding:9px 12px;border-radius:8px;transition:background .12s}
.item:hover{background:var(--surface2)}
.item.done{opacity:.35}
.item.done .item-title{text-decoration:line-through;color:var(--faint)}
.item-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--faint);text-align:right;user-select:none}
.item-main{display:flex;align-items:center;gap:10px;min-width:0;cursor:pointer}
.item-check{width:16px;height:16px;border-radius:4px;border:1px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.item.done .item-check{background:var(--accent);border-color:var(--accent)}
.item-check svg{display:none}
.item.done .item-check svg{display:block}
.item-info{min-width:0}
.item-title{font-size:14px;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.item-sub{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.type-badge{font-size:10px;padding:2px 8px;border-radius:999px;font-family:'DM Mono',monospace;letter-spacing:.03em;font-weight:500}
.type-movie{background:rgba(232,154,125,.12);color:var(--movie);border:1px solid rgba(232,154,125,.2)}
.type-anime{background:rgba(168,155,220,.12);color:var(--anime);border:1px solid rgba(168,155,220,.2)}
.type-show{background:rgba(126,184,212,.12);color:var(--show);border:1px solid rgba(126,184,212,.2)}
.or-badge{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(130,217,197,.1);color:var(--or);border:1px solid rgba(130,217,197,.2);white-space:nowrap}
.source-badge{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(232,201,125,.08);color:rgba(232,201,125,.5);border:1px solid rgba(232,201,125,.12);white-space:nowrap}
.source-planned{background:rgba(196,224,180,.08);color:rgba(196,224,180,.5);border:1px solid rgba(196,224,180,.12)}
.custom-badge{background:rgba(232,201,125,.15);color:var(--accent);border:1px solid rgba(232,201,125,.3)}
.franchise-tag{font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,.04);color:var(--faint);border:1px solid var(--border);white-space:nowrap}
.imdb-btn{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;background:rgba(245,197,24,.1);color:#f5c518;border:1px solid rgba(245,197,24,.2);font-size:10px;font-family:'DM Mono',monospace;font-weight:500;cursor:pointer;text-decoration:none;transition:background .12s;white-space:nowrap}
.imdb-btn:hover{background:rgba(245,197,24,.22)}
.del-btn{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;background:rgba(232,100,100,.08);color:rgba(232,100,100,.6);border:1px solid rgba(232,100,100,.2);font-size:10px;font-family:'DM Mono',monospace;cursor:pointer;transition:background .12s;white-space:nowrap}
.del-btn:hover{background:rgba(232,100,100,.2);color:#e86464}
.duration{font-family:'DM Mono',monospace;font-size:11px;color:var(--faint);white-space:nowrap;min-width:60px;text-align:right}
.total-time-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 2rem;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted)}
.total-time-bar strong{color:var(--text);font-family:'DM Mono',monospace}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:1.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Instrument Serif',serif;font-size:1.4rem;font-weight:400;margin-bottom:1.25rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field input,.field select{width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:var(--surface2)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-note{font-size:11px;color:var(--faint);margin-top:4px}
.modal-actions{display:flex;gap:8px;margin-top:1.5rem}
.btn-primary{flex:1;padding:9px;border-radius:8px;background:var(--accent);color:#1a1500;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
.btn-secondary{padding:9px 16px;border-radius:8px;background:transparent;color:var(--muted);border:1px solid var(--border2);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.btn-primary:hover{opacity:.9}
.btn-secondary:hover{color:var(--text);border-color:rgba(255,255,255,.25)}
@media(max-width:640px){
  header{padding:1.5rem 1rem 1rem}
  .controls,.list-container{padding-left:1rem;padding-right:1rem}
  .stats{gap:1rem}
  .item{grid-template-columns:22px 1fr auto}
  .source-badge,.source-planned,.or-badge,.franchise-tag{display:none}
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>The <em>master</em> watchlist</h1>
    <p>Sorted by total duration · Click item to mark watched · IMDb ↗ opens page</p>
    <p style="margin-top:6px;font-size:12px" id="sync-status">⏳ Connecting…</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="stat-total">—</div><div class="stat-l">total titles</div></div>
    <div class="stat"><div class="stat-n" id="stat-done" style="color:var(--accent)">0</div><div class="stat-l">watched</div></div>
    <div class="stat"><div class="stat-n" id="stat-hours">—</div><div class="stat-l">hrs remaining</div></div>
  </div>
</header>

<div class="controls">
  <div class="filters">
    <button class="filter-btn active" onclick="window.filterList('all',this)">All</button>
    <button class="filter-btn f-movie" onclick="window.filterList('movie',this)">Movies</button>
    <button class="filter-btn f-anime" onclick="window.filterList('anime',this)">Anime</button>
    <button class="filter-btn f-show" onclick="window.filterList('show',this)">Shows</button>
    <button class="filter-btn f-or" onclick="window.filterList('or',this)">OR / EM Films</button>
    <button class="filter-btn" onclick="window.filterList('planned',this)">Planned anime</button>
    <button class="filter-btn" onclick="window.filterList('rec',this)">Recommended</button>
    <button class="filter-btn custom-badge" onclick="window.filterList('custom',this)">My additions</button>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <button class="add-btn" onclick="window.openModal()">+ Add title</button>
    <div class="progress-bar-wrap">
      <div class="progress-bar"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="progress-text" id="prog-text">0 / —</span>
    </div>
  </div>
</div>

<div class="list-container" id="list"></div>

<div class="total-time-bar">
  <span><span style="color:var(--movie)">■</span> Movie &nbsp;<span style="color:var(--anime)">■</span> Anime &nbsp;<span style="color:var(--show)">■</span> Show &nbsp;<span style="color:var(--or)">■</span> OR/EM</span>
  <span>Remaining: <strong id="footer-time">calculating…</strong></span>
</div>

<!-- Add Title Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)window.closeModal()">
  <div class="modal">
    <h2>Add a title</h2>
    <div class="field">
      <label>Title *</label>
      <input type="text" id="f-title" placeholder="e.g. Severance">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Type *</label>
        <select id="f-type">
          <option value="movie">Movie</option>
          <option value="show">Show</option>
          <option value="anime">Anime</option>
        </select>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="f-tag">
          <option value="personal">Personal pick</option>
          <option value="planned">Planned anime</option>
          <option value="rec">Recommended</option>
          <option value="or">OR / EM Film</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Genre</label>
      <input type="text" id="f-genre" placeholder="e.g. Crime / Thriller">
    </div>
    <div class="field-row">
      <div class="field">
        <label id="f-dur-label">Runtime (minutes) *</label>
        <input type="number" id="f-mins" placeholder="e.g. 120" min="1">
        <div class="field-note" id="f-dur-note">For a movie, enter total minutes</div>
      </div>
      <div class="field" id="f-eps-wrap" style="display:none">
        <label>Episodes</label>
        <input type="number" id="f-eps" placeholder="e.g. 24" min="1">
      </div>
    </div>
    <div class="field">
      <label>Extra info (year, cast, platform…)</label>
      <input type="text" id="f-sub" placeholder="e.g. Netflix · 2023 · Ryan Reynolds">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="window.closeModal()">Cancel</button>
      <button class="btn-primary" onclick="window.submitAdd()">Add to list</button>
    </div>
  </div>
</div>

// ── State ─────────────────────────────────────────────────────
let doneSet=new Set();
let customItems=[];  // [{rank,title,sub,type,genre,mins,eps,tag,or,custom}]
let activeFilter='all';
const CUSTOM_RANK_START=1000; // custom items get ranks 1000+

function allData(){
  return [...baseData,...customItems];
}

// ── Helpers ───────────────────────────────────────────────────
function fmtDur(mins,eps){
  const h=Math.floor(mins/60),m=mins%60;
  return eps?`${eps} eps · ${h}h${m?m+'m':''}`:`${h}h ${m}m`;
}
function fmtHours(mins){
  if(mins>24*60)return`${(mins/60/24).toFixed(1)} days`;
  const h=Math.floor(mins/60),m=mins%60;
  return`${h}h ${m}m`;
}
function matchesFilter(d){
  if(activeFilter==='all')     return true;
  if(activeFilter==='movie')   return d.type==='movie';
  if(activeFilter==='anime')   return d.type==='anime';
  if(activeFilter==='show')    return d.type==='show';
  if(activeFilter==='or')      return d.or===true;
  if(activeFilter==='planned') return d.tag==='planned';
  if(activeFilter==='rec')     return d.tag==='rec';
  if(activeFilter==='custom')  return d.custom===true;
  return true;
}

const tiers=[
  {label:'Quick watch — under 2 hours',max:120},
  {label:'Short — 2 to 8 hours',max:480},
  {label:'Medium — 8 to 20 hours',max:1200},
  {label:'Long haul — 20 to 50 hours',max:3000},
  {label:'Marathon — 50+ hours',max:Infinity},
];

// ── Render ────────────────────────────────────────────────────
function render(){
  const list=document.getElementById('list');
  const visible=[...allData()].sort((a,b)=>a.mins-b.mins).filter(matchesFilter);
  if(!visible.length){
    list.innerHTML='<div style="padding:3rem;text-align:center;color:var(--muted)">No titles match this filter.</div>';
    updateStats(visible);return;
  }
  let html='',counter=1;
  tiers.forEach((tier,ti)=>{
    const prevMax=ti===0?0:tiers[ti-1].max;
    const items=visible.filter(d=>d.mins>prevMax&&d.mins<=tier.max);
    if(!items.length)return;
    html+=`<div class="rank-section"><div class="rank-section-header"><span class="rank-label">${tier.label}</span><div class="rank-line"></div></div>`;
    items.forEach(d=>{
      const done=doneSet.has(d.rank);
      const orBadge=d.or?`<span class="or-badge">OR/EM</span>`:'';
      const fBadge=d.franchise?`<span class="franchise-tag">${d.franchise}</span>`:'';
      const srcClass=d.custom?'source-badge custom-badge':d.tag==='planned'?'source-planned':'source-badge';
      const srcLabel=d.custom?'My add':d.tag==='planned'?'Planned':d.tag==='or'?'OR/EM':d.tag==='rec'?'Rec':'—';
      const imdbHref=`https://www.imdb.com/find/?q=${encodeURIComponent(d.title)}`;
      const delBtn=d.custom?`<button class="del-btn" onclick="event.stopPropagation();window.deleteCustom(${d.rank})">✕</button>`:'';
      html+=`<div class="item${done?' done':''}" onclick="window.toggleItem(${d.rank})">
        <div class="item-num">${counter++}</div>
        <div class="item-main">
          <div class="item-check"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#0d0d0f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="item-info">
            <div class="item-title">${d.title}</div>
            <div class="item-sub">${d.sub||''}${d.sub&&d.genre?' · ':''}<span style="color:var(--faint)">${d.genre||''}</span></div>
          </div>
        </div>
        <div class="item-meta">
          ${fBadge}${orBadge}
          <span class="${srcClass}">${srcLabel}</span>
          <span class="type-badge type-${d.type}">${d.type}</span>
          <a class="imdb-btn" href="${imdbHref}" target="_blank" rel="noopener" onclick="event.stopPropagation()">IMDb ↗</a>
          ${delBtn}
          <span class="duration">${fmtDur(d.mins,d.eps)}</span>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  list.innerHTML=html;
  updateStats(visible);
}

function updateStats(visible){
  if(!visible)visible=[...allData()].sort((a,b)=>a.mins-b.mins).filter(matchesFilter);
  const done=visible.filter(d=>doneSet.has(d.rank));
  const rem=visible.filter(d=>!doneSet.has(d.rank)).reduce((a,b)=>a+b.mins,0);
  document.getElementById('stat-total').textContent=visible.length;
  document.getElementById('stat-done').textContent=done.length;
  document.getElementById('stat-hours').textContent=Math.round(rem/60).toLocaleString();
  document.getElementById('footer-time').textContent=fmtHours(rem);
  const pct=visible.length?(done.length/visible.length*100):0;
  document.getElementById('prog-fill').style.width=pct.toFixed(1)+'%';
  document.getElementById('prog-text').textContent=`${done.length} / ${visible.length}`;
}

// ── Actions — exposed to window for onclick handlers ──────────
window.toggleItem=function(rank){
  doneSet.has(rank)?doneSet.delete(rank):doneSet.add(rank);
  saveToFirestore();render();
};

window.filterList=function(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
};

window.deleteCustom=function(rank){
  customItems=customItems.filter(c=>c.rank!==rank);
  doneSet.delete(rank);
  saveToFirestore();render();
};

// ── Add title modal ───────────────────────────────────────────
window.openModal=function(){
  document.getElementById('modal').classList.add('open');
  document.getElementById('f-title').focus();
};
window.closeModal=function(){
  document.getElementById('modal').classList.remove('open');
  ['f-title','f-genre','f-sub','f-mins','f-eps'].forEach(id=>{document.getElementById(id).value='';});
};

// Show/hide episodes field based on type
document.getElementById('f-type').addEventListener('change',function(){
  const isShow=this.value==='show'||this.value==='anime';
  document.getElementById('f-eps-wrap').style.display=isShow?'block':'none';
  document.getElementById('f-dur-label').textContent=isShow?'Avg episode runtime (mins) *':'Runtime (minutes) *';
  document.getElementById('f-dur-note').textContent=isShow?'Per episode, e.g. 24 for anime, 42 for drama':'Total movie runtime in minutes';
});

window.submitAdd=function(){
  const title=document.getElementById('f-title').value.trim();
  const type=document.getElementById('f-type').value;
  const tag=document.getElementById('f-tag').value;
  const genre=document.getElementById('f-genre').value.trim();
  const sub=document.getElementById('f-sub').value.trim();
  const minsRaw=parseInt(document.getElementById('f-mins').value)||0;
  const eps=parseInt(document.getElementById('f-eps').value)||null;
  if(!title||!minsRaw){alert('Title and runtime are required.');return;}
  const totalMins=(type==='show'||type==='anime')&&eps ? minsRaw*eps : minsRaw;
  const maxRank=Math.max(...[...baseData,...customItems].map(d=>d.rank),CUSTOM_RANK_START-1);
  const newItem={
    rank:maxRank+1,title,sub,type,genre,mins:totalMins,tag,
    or:tag==='or',custom:true,
    ...(eps?{eps}:{}),
  };
  customItems.push(newItem);
  saveToFirestore();
  window.closeModal();
  render();
};

// ── Boot ──────────────────────────────────────────────────────
(async()=>{
  const saved=await loadFromFirestore();
  doneSet=saved.done;
  customItems=saved.custom;
  render();
})();
</script>
